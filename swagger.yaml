openapi: 3.0.0
paths:
  /api/v1:
    get:
      operationId: AppController_getHello
      parameters: []
      responses:
        '200':
          description: ''
      tags:
        - App
  /api/v1/users/me:
    get:
      description: Retrieve authenticated user profile information
      operationId: UserController_findMe
      parameters: []
      responses:
        '200':
          description: User profile retrieved successfully
        '401':
          description: Unauthorized
      security:
        - bearer: []
      summary: Get current user profile
      tags:
        - Users
    patch:
      description: Update current user profile information
      operationId: UserController_updateProfile
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileDto'
      responses:
        '200':
          description: Profile updated successfully
        '400':
          description: Invalid input data
        '401':
          description: Unauthorized
      security:
        - bearer: []
      summary: Update user profile
      tags:
        - Users
  /api/v1/users/me/avatar:
    post:
      description: Upload a new avatar image for the current user (max 5MB)
      operationId: UserController_uploadAvatar
      parameters: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                avatar:
                  type: string
                  format: binary
      responses:
        '200':
          description: Avatar uploaded successfully
        '400':
          description: File too large or invalid format
        '401':
          description: Unauthorized
      security:
        - bearer: []
      summary: Upload user avatar
      tags:
        - Users
  /api/v1/auth/register:
    post:
      description: Create a new user account and send verification email
      operationId: AuthController_register
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserDto'
      responses:
        '201':
          description: User registered successfully. Verification email sent.
        '400':
          description: Invalid input data
      summary: Register a new user
      tags:
        - Authentication
  /api/v1/auth/login:
    post:
      description: Login with email and password to receive JWT token
      operationId: AuthController_login
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginDto'
      responses:
        '200':
          description: Login successful. Returns JWT token
        '401':
          description: Invalid credentials
      summary: User login
      tags:
        - Authentication
  /api/v1/auth/forgot-password:
    post:
      description: Send password reset link to user email
      operationId: AuthController_forgotPassword
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              properties:
                email:
                  type: string
                  example: user@example.com
      responses:
        '200':
          description: Reset link sent to email
        '400':
          description: Email is required
      summary: Request password reset
      tags:
        - Authentication
  /api/v1/auth/reset-password:
    post:
      description: Set new password using reset token
      operationId: AuthController_resetPassword
      parameters:
        - name: token
          required: true
          in: query
          description: Reset token from email
          schema:
            type: string
        - name: id
          required: true
          in: query
          description: User ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              properties:
                password:
                  type: string
                  example: newPassword123
      responses:
        '200':
          description: Password reset successfully
        '400':
          description: Invalid token or password not provided
      summary: Reset password
      tags:
        - Authentication
  /api/v1/auth/verify-email:
    post:
      description: Verify user email using token sent to email
      operationId: AuthController_verifyEmail
      parameters:
        - name: token
          required: true
          in: query
          description: Verification token from email
          schema:
            type: string
        - name: id
          required: true
          in: query
          description: User ID
          schema:
            type: string
      responses:
        '200':
          description: Email verified successfully
        '400':
          description: Invalid verification token
      summary: Verify email
      tags:
        - Authentication
  /api/v1/workspaces:
    post:
      description: Create a new workspace for the current user
      operationId: WorkspaceController_create
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkspaceDto'
      responses:
        '201':
          description: Workspace created successfully
        '400':
          description: Invalid input data
        '401':
          description: Unauthorized
      security:
        - bearer: []
      summary: Create new workspace
      tags:
        - Workspaces
    get:
      description: Retrieve all workspaces for the current user with optional filtering
      operationId: WorkspaceController_findAll
      parameters:
        - name: limit
          required: false
          in: query
          description: Items per page
          schema:
            example: 20
            type: number
        - name: page
          required: false
          in: query
          description: Page number
          schema:
            example: 1
            type: number
        - name: filter
          required: false
          in: query
          description: Filter workspaces
          schema:
            enum:
              - owned
              - member
              - all
            type: string
      responses:
        '200':
          description: Workspaces retrieved successfully
        '401':
          description: Unauthorized
      security:
        - bearer: []
      summary: Get user workspaces
      tags:
        - Workspaces
  /api/v1/workspaces/{workspaceId}:
    patch:
      description: Update workspace information
      operationId: WorkspaceController_update
      parameters:
        - name: workspaceId
          required: true
          in: path
          description: Workspace UUID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWorkspaceDto'
      responses:
        '200':
          description: Workspace updated successfully
        '401':
          description: Unauthorized
      security:
        - bearer: []
      summary: Update workspace
      tags:
        - Workspaces
    delete:
      description: Remove a workspace permanently
      operationId: WorkspaceController_removeWorkspace
      parameters:
        - name: workspaceId
          required: true
          in: path
          description: Workspace UUID
          schema:
            type: string
      responses:
        '200':
          description: Workspace deleted successfully
        '401':
          description: Unauthorized
      security:
        - bearer: []
      summary: Delete workspace
      tags:
        - Workspaces
  /api/v1/workspaces/{workspaceId}/members:
    get:
      description: Retrieve all members of a workspace
      operationId: WorkspaceController_findMembers
      parameters:
        - name: workspaceId
          required: true
          in: path
          description: Workspace UUID
          schema:
            type: string
      responses:
        '200':
          description: Members retrieved successfully
        '404':
          description: Workspace not found
      security:
        - bearer: []
      summary: Get workspace members
      tags:
        - Workspaces
  /api/v1/workspaces/{workspaceId}/members/{userId}:
    patch:
      description: Change member role to admin, member, or viewer
      operationId: WorkspaceController_updateMembersPrivilages
      parameters:
        - name: workspaceId
          required: true
          in: path
          description: Workspace UUID
          schema:
            type: string
        - name: userId
          required: true
          in: path
          description: User UUID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              properties:
                role:
                  type: string
                  enum:
                    - admin
                    - member
                    - viewer
      responses:
        '200':
          description: Member role updated successfully
        '400':
          description: Invalid role
      security:
        - bearer: []
      summary: Update member role
      tags:
        - Workspaces
    delete:
      description: Remove a member from a workspace
      operationId: WorkspaceController_remove
      parameters:
        - name: workspaceId
          required: true
          in: path
          description: Workspace UUID
          schema:
            type: string
        - name: userId
          required: true
          in: path
          description: User UUID
          schema:
            type: string
      responses:
        '200':
          description: Member removed successfully
        '401':
          description: Unauthorized
      security:
        - bearer: []
      summary: Remove member from workspace
      tags:
        - Workspaces
  /api/v1/workspaces/{workspaceId}/invitations:
    post:
      description: Send invitation to user to join workspace
      operationId: WorkspaceController_inviteMember
      parameters:
        - name: workspaceId
          required: true
          in: path
          description: Workspace UUID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInvitationDto'
      responses:
        '201':
          description: Invitation sent successfully
        '400':
          description: Invalid email
      security:
        - bearer: []
      summary: Invite member to workspace
      tags:
        - Workspaces
  /api/v1/workspaces/accept-invitation:
    post:
      description: Accept an invitation to join a workspace
      operationId: WorkspaceController_acceptInvitation
      parameters:
        - name: invitationId
          required: true
          in: query
          description: Invitation UUID
          schema:
            type: string
        - name: senderId
          required: true
          in: query
          description: Sender user UUID
          schema:
            type: string
      responses:
        '200':
          description: Invitation accepted successfully
        '400':
          description: Invalid invitation
      security:
        - bearer: []
      summary: Accept workspace invitation
      tags:
        - Workspaces
  /api/v1/workspace-member:
    post:
      operationId: WorkspaceMemberController_create
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkspaceMemberDto'
      responses:
        '201':
          description: ''
      tags:
        - WorkspaceMember
    get:
      operationId: WorkspaceMemberController_findAll
      parameters: []
      responses:
        '200':
          description: ''
      tags:
        - WorkspaceMember
  /api/v1/workspace-member/{id}:
    patch:
      operationId: WorkspaceMemberController_update
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWorkspaceMemberDto'
      responses:
        '200':
          description: ''
      tags:
        - WorkspaceMember
    delete:
      operationId: WorkspaceMemberController_remove
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: ''
      tags:
        - WorkspaceMember
  /api/v1/workspaces/{workspaceId}/boards:
    post:
      description: Create a new board in a workspace
      operationId: BoardController_create
      parameters:
        - name: workspaceId
          required: true
          in: path
          description: Workspace UUID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBoardDto'
      responses:
        '201':
          description: Board created successfully
        '400':
          description: Invalid input data
        '401':
          description: Unauthorized
      security:
        - bearer: []
      summary: Create a new board
      tags:
        - Boards
    get:
      description: Retrieve paginated list of boards in a workspace with optional filtering
      operationId: BoardController_findAll
      parameters:
        - name: workspaceId
          required: true
          in: path
          description: Workspace UUID
          schema:
            type: string
        - name: page
          required: false
          in: query
          description: Page number
          schema:
            example: 1
            type: number
        - name: limit
          required: false
          in: query
          description: Items per page
          schema:
            example: 10
            type: number
        - name: filter
          required: false
          in: query
          description: Filter by board status
          schema:
            enum:
              - all
              - archived
              - active
            type: string
      responses:
        '200':
          description: Boards retrieved successfully
        '401':
          description: Unauthorized
        '404':
          description: Workspace not found
      security:
        - bearer: []
      summary: Get all boards in workspace
      tags:
        - Boards
  /api/v1/boards/{boardId}/columns:
    post:
      description: Create a new column in a board
      operationId: ColumnController_create
      parameters:
        - name: boardId
          required: true
          in: path
          description: Board UUID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateColumnDto'
      responses:
        '201':
          description: Column created successfully
        '401':
          description: Unauthorized
      security:
        - bearer: []
      summary: Create new column
      tags:
        - Columns & Boards Management
    get:
      description: Retrieve all columns for a specific board
      operationId: ColumnController_findAll
      parameters:
        - name: boardId
          required: true
          in: path
          description: Board UUID
          schema:
            type: string
      responses:
        '200':
          description: Columns retrieved successfully
        '401':
          description: Unauthorized
      security:
        - bearer: []
      summary: Get all columns in board
      tags:
        - Columns & Boards Management
  /api/v1/boards/{boardId}/tasks:
    post:
      description: Create a new task directly in a board
      operationId: ColumnController_createTasks
      parameters:
        - name: boardId
          required: true
          in: path
          description: Board UUID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskDto'
      responses:
        '201':
          description: Task created successfully
      security:
        - bearer: []
      summary: Create task in board
      tags:
        - Columns & Boards Management
    get:
      description: Retrieve paginated list of tasks for a specific board
      operationId: TaskController_findAll
      parameters:
        - name: boardId
          required: true
          in: path
          description: Board UUID
          schema:
            type: string
        - name: limit
          required: true
          in: query
          description: Number of items per page
          schema:
            example: 50
            type: number
        - name: page
          required: true
          in: query
          description: Page number
          schema:
            example: 1
            type: number
        - name: columnId
          required: false
          in: query
          description: Filter by column ID
          schema:
            type: string
        - name: assigneeId
          required: false
          in: query
          description: Filter by assignee user ID
          schema:
            type: string
        - name: priority
          required: false
          in: query
          description: Filter by priority
          schema:
            type: string
            enum:
              - low
              - medium
              - high
              - urgent
        - name: tagId
          required: false
          in: query
          description: Filter by tag ID
          schema:
            type: string
        - name: dueDateFrom
          required: false
          in: query
          description: Filter tasks with due date from this date
          schema:
            format: date-time
            example: 2026-04-12T16:59:56.438Z
            type: string
        - name: dueDateTo
          required: false
          in: query
          description: Filter tasks with due date to this date
          schema:
            format: date-time
            example: 2026-04-12T16:59:56.438Z
            type: string
        - name: search
          required: false
          in: query
          description: Search term for task title/description
          schema:
            example: search term
            type: string
        - name: sortBy
          required: false
          in: query
          description: Sort by field
          schema:
            type: string
            enum:
              - createdAt
              - dueDate
              - priority
              - updatedAt
        - name: sortOrder
          required: false
          in: query
          description: Sort order (asc/desc)
          schema:
            type: string
            enum:
              - ASC
              - DESC
        - name: status
          required: false
          in: query
          description: Filter by task status
          schema:
            type: string
      responses:
        '200':
          description: Tasks retrieved successfully
        '401':
          description: Unauthorized
        '404':
          description: Board not found
      security:
        - bearer: []
      summary: Get all tasks in a board
      tags:
        - Tasks
  /api/v1/boards/{boardId}/archive:
    post:
      description: Archive a board to hide it from active boards
      operationId: ColumnController_archiveBoard
      parameters:
        - name: boardId
          required: true
          in: path
          description: Board UUID
          schema:
            type: string
      responses:
        '200':
          description: Board archived successfully
      security:
        - bearer: []
      summary: Archive board
      tags:
        - Columns & Boards Management
  /api/v1/boards/{boardId}/restore:
    post:
      description: Restore an archived board back to active
      operationId: ColumnController_restoreBoard
      parameters:
        - name: boardId
          required: true
          in: path
          description: Board UUID
          schema:
            type: string
      responses:
        '200':
          description: Board restored successfully
      security:
        - bearer: []
      summary: Restore archived board
      tags:
        - Columns & Boards Management
  /api/v1/boards/{boardId}:
    patch:
      description: Update board information
      operationId: ColumnController_updateBoard
      parameters:
        - name: boardId
          required: true
          in: path
          description: Board UUID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBoardDto'
      responses:
        '200':
          description: Board updated successfully
      security:
        - bearer: []
      summary: Update board
      tags:
        - Columns & Boards Management
    delete:
      description: Remove a board permanently
      operationId: ColumnController_removeBoard
      parameters:
        - name: boardId
          required: true
          in: path
          description: Board UUID
          schema:
            type: string
      responses:
        '200':
          description: Board deleted successfully
      security:
        - bearer: []
      summary: Delete board
      tags:
        - Columns & Boards Management
  /api/v1/boards/{boardId}/columns/{columnId}:
    patch:
      description: Update column information
      operationId: ColumnController_update
      parameters:
        - name: boardId
          required: true
          in: path
          description: Board UUID
          schema:
            type: string
        - name: columnId
          required: true
          in: path
          description: Column UUID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateColumnDto'
      responses:
        '200':
          description: Column updated successfully
      security:
        - bearer: []
      summary: Update column
      tags:
        - Columns & Boards Management
    delete:
      description: Remove a column from a board
      operationId: ColumnController_remove
      parameters:
        - name: boardId
          required: true
          in: path
          description: Board UUID
          schema:
            type: string
        - name: columnId
          required: true
          in: path
          description: Column UUID
          schema:
            type: string
      responses:
        '200':
          description: Column deleted successfully
      security:
        - bearer: []
      summary: Delete column
      tags:
        - Columns & Boards Management
  /api/v1/boards/{boardId}/columns/reorder:
    put:
      description: Change the order of columns in a board
      operationId: ColumnController_reOrderColumn
      parameters:
        - name: boardId
          required: true
          in: path
          description: Board UUID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReOrderColumnDto'
      responses:
        '200':
          description: Columns reordered successfully
      security:
        - bearer: []
      summary: Reorder columns
      tags:
        - Columns & Boards Management
  /api/v1/tasks/{taskId}:
    get:
      description: Retrieve detailed information about a specific task
      operationId: TaskController_findOne
      parameters:
        - name: taskId
          required: true
          in: path
          description: Task UUID
          schema:
            type: string
      responses:
        '200':
          description: Task details retrieved successfully
        '401':
          description: Unauthorized
        '404':
          description: Task not found
      security:
        - bearer: []
      summary: Get task details
      tags:
        - Tasks
  /api/v1/{taskId}:
    patch:
      description: Update task information like title, description, priority, etc.
      operationId: TaskController_update
      parameters:
        - name: taskId
          required: true
          in: path
          description: Task UUID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTaskDto'
      responses:
        '200':
          description: Task updated successfully
        '400':
          description: Invalid input data
        '401':
          description: Unauthorized
        '404':
          description: Task not found
      security:
        - bearer: []
      summary: Update task
      tags:
        - Tasks
    delete:
      description: Remove a task completely
      operationId: TaskController_remove
      parameters:
        - name: taskId
          required: true
          in: path
          description: Task UUID
          schema:
            type: string
      responses:
        '200':
          description: Task deleted successfully
        '401':
          description: Unauthorized
        '404':
          description: Task not found
      security:
        - bearer: []
      summary: Delete task
      tags:
        - Tasks
  /api/v1/tasks/{taskId}/assignees:
    post:
      description: Add one or more users as assignees to a task
      operationId: TaskController_assignTask
      parameters:
        - name: taskId
          required: true
          in: path
          description: Task UUID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignUsersToTaskDto'
      responses:
        '201':
          description: Users assigned successfully
        '400':
          description: Invalid user IDs
        '401':
          description: Unauthorized
      security:
        - bearer: []
      summary: Assign users to task
      tags:
        - Tasks
  /api/v1/tasks/{taskId}/assignees/{userId}:
    delete:
      description: Remove a user from task assignees
      operationId: TaskController_unassignTask
      parameters:
        - name: taskId
          required: true
          in: path
          description: Task UUID
          schema:
            type: string
        - name: userId
          required: true
          in: path
          description: User UUID
          schema:
            type: string
      responses:
        '200':
          description: User unassigned successfully
        '401':
          description: Unauthorized
        '404':
          description: Task or user not found
      security:
        - bearer: []
      summary: Unassign user from task
      tags:
        - Tasks
  /api/v1/tasks/{taskId}/move:
    patch:
      description: Move a task from one column to another
      operationId: TaskController_moveTask
      parameters:
        - name: taskId
          required: true
          in: path
          description: Task UUID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MoveTaskDto'
      responses:
        '200':
          description: Task moved successfully
        '400':
          description: Invalid column ID
        '401':
          description: Unauthorized
      security:
        - bearer: []
      summary: Move task to different column
      tags:
        - Tasks
  /api/v1/tasks/{taskId}/comments:
    post:
      description: Add a new comment to a task
      operationId: CommentController_create
      parameters:
        - name: taskId
          required: true
          in: path
          description: Task UUID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCommentDto'
      responses:
        '201':
          description: Comment created successfully
        '404':
          description: Task not found
      security:
        - bearer: []
      summary: Create comment on task
      tags:
        - Comments
    get:
      description: Retrieve paginated list of comments for a task
      operationId: CommentController_findAll
      parameters:
        - name: taskId
          required: true
          in: path
          description: Task UUID
          schema:
            type: string
        - name: page
          required: false
          in: query
          description: Page number
          schema:
            example: 1
            type: number
        - name: limit
          required: false
          in: query
          description: Items per page
          schema:
            example: 20
            type: number
      responses:
        '200':
          description: Comments retrieved successfully
      security:
        - bearer: []
      summary: Get task comments
      tags:
        - Comments
  /api/v1/comments/{commentId}:
    patch:
      description: Update an existing comment
      operationId: CommentController_update
      parameters:
        - name: commentId
          required: true
          in: path
          description: Comment UUID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCommentDto'
      responses:
        '200':
          description: Comment updated successfully
      security:
        - bearer: []
      summary: Update comment
      tags:
        - Comments
    delete:
      description: Remove a comment
      operationId: CommentController_remove
      parameters:
        - name: commentId
          required: true
          in: path
          description: Comment UUID
          schema:
            type: string
      responses:
        '200':
          description: Comment deleted successfully
      security:
        - bearer: []
      summary: Delete comment
      tags:
        - Comments
  /api/v1/tasks/{taskId}/attachments:
    post:
      description: Upload a file attachment to a task (max 10MB)
      operationId: AttachmentController_create
      parameters:
        - name: taskId
          required: true
          in: path
          description: Task UUID
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Attachment uploaded successfully
        '400':
          description: File too large
      security:
        - bearer: []
      summary: Upload task attachment
      tags:
        - Attachments
    get:
      description: Retrieve all attachments for a task
      operationId: AttachmentController_findAll
      parameters:
        - name: taskId
          required: true
          in: path
          description: Task UUID
          schema:
            type: string
      responses:
        '200':
          description: Attachments retrieved successfully
      security:
        - bearer: []
      summary: Get task attachments
      tags:
        - Attachments
  /api/v1/attachments/{attachmentId}/download:
    get:
      description: Download an attachment file
      operationId: AttachmentController_downloadAttachment
      parameters:
        - name: attachmentId
          required: true
          in: path
          description: Attachment UUID
          schema:
            type: string
      responses:
        '200':
          description: File downloaded successfully
        '404':
          description: Attachment not found
      security:
        - bearer: []
      summary: Download attachment
      tags:
        - Attachments
  /api/v1/{id}:
    patch:
      operationId: AttachmentController_update
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAttachmentDto'
      responses:
        '200':
          description: ''
      security:
        - bearer: []
      tags:
        - Attachments
  /api/v1/attachments/attachmentId:
    delete:
      description: Remove an attachment file
      operationId: AttachmentController_remove
      parameters:
        - name: attachmentId
          required: true
          in: path
          description: Attachment UUID
          schema:
            type: string
      responses:
        '200':
          description: Attachment deleted successfully
      security:
        - bearer: []
      summary: Delete attachment
      tags:
        - Attachments
  /api/v1/tag:
    post:
      description: Create a new tag for organizing tasks
      operationId: TagController_create
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTagDto'
      responses:
        '201':
          description: Tag created successfully
        '400':
          description: Invalid input data
      summary: Create tag
      tags:
        - Tags
    get:
      description: Retrieve all available tags
      operationId: TagController_findAll
      parameters: []
      responses:
        '200':
          description: Tags retrieved successfully
      summary: Get all tags
      tags:
        - Tags
  /api/v1/activity:
    post:
      description: Log a new activity
      operationId: ActivityController_create
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateActivityDto'
      responses:
        '201':
          description: Activity created successfully
      security:
        - bearer: []
      summary: Create activity
      tags:
        - Activity
  /api/v1/activity/tasks/{taskId}/activity:
    get:
      description: Retrieve activity log for a specific task
      operationId: ActivityController_findAll
      parameters:
        - name: taskId
          required: true
          in: path
          description: Task UUID
          schema:
            type: string
        - name: page
          required: false
          in: query
          description: Page number
          schema:
            example: 1
            type: number
        - name: limit
          required: false
          in: query
          description: Items per page
          schema:
            example: 20
            type: number
      responses:
        '200':
          description: Activity log retrieved successfully
        '404':
          description: Task not found
      security:
        - bearer: []
      summary: Get task activity log
      tags:
        - Activity
  /api/v1/notifications/mark-all-read:
    post:
      description: Mark all user notifications as read
      operationId: NotificationController_markAllAsRead
      parameters: []
      responses:
        '200':
          description: All notifications marked as read
      security:
        - bearer: []
      summary: Mark all notifications as read
      tags:
        - Notifications
  /api/v1/notifications:
    get:
      description: Retrieve all notifications for the current user
      operationId: NotificationController_findAll
      parameters: []
      responses:
        '200':
          description: Notifications retrieved successfully
      security:
        - bearer: []
      summary: Get user notifications
      tags:
        - Notifications
  /api/v1/notifications/{notification_id}/read:
    patch:
      description: Mark a specific notification as read
      operationId: NotificationController_markAsRead
      parameters:
        - name: notification_id
          required: true
          in: path
          description: Notification UUID
          schema:
            type: string
      responses:
        '200':
          description: Notification marked as read
      security:
        - bearer: []
      summary: Mark notification as read
      tags:
        - Notifications
  /api/v1/task-assignee:
    post:
      operationId: TaskAssigneeController_create
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskAssigneeDto'
      responses:
        '201':
          description: ''
      tags:
        - TaskAssignee
    get:
      operationId: TaskAssigneeController_findAll
      parameters: []
      responses:
        '200':
          description: ''
      tags:
        - TaskAssignee
  /api/v1/task-tags:
    post:
      operationId: TaskTagsController_create
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskTagDto'
      responses:
        '201':
          description: ''
      tags:
        - TaskTags
    get:
      operationId: TaskTagsController_findAll
      parameters: []
      responses:
        '200':
          description: ''
      tags:
        - TaskTags
  /api/v1/task-watcher:
    post:
      operationId: TaskWatcherController_create
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskWatcherDto'
      responses:
        '201':
          description: ''
      tags:
        - TaskWatcher
    get:
      operationId: TaskWatcherController_findAll
      parameters: []
      responses:
        '200':
          description: ''
      tags:
        - TaskWatcher
  /api/v1/search:
    get:
      description: Search for tasks, comments, attachments across the workspace
      operationId: SearchController_globalSearch
      parameters:
        - name: query
          required: true
          in: query
          description: term to search with
          schema:
            example: task hello
            type: string
        - name: workspaceId
          required: false
          in: query
          description: id of the workspace that user wants to search for
          schema:
            example: 12323-123142-1231232-124324123
            type: string
        - name: type
          required: false
          in: query
          description: Filter by item type (task, comment, etc)
          schema:
            example: BOARDS
            type: string
            enum:
              - TASKS
              - BOARDS
              - ALL
        - name: page
          required: false
          in: query
          description: page number of the search results
          schema:
            minimum: 1
            default: 1
            example: 1
            type: number
        - name: limit
          required: false
          in: query
          description: can not be negative
          schema:
            minimum: 1
            default: 20
            example: 20
            type: number
        - name: q
          required: true
          in: query
          description: Search query string
          schema:
            type: string
      responses:
        '200':
          description: Search results retrieved successfully
        '400':
          description: Invalid search query
      security:
        - bearer: []
      summary: Global search
      tags:
        - Search
info:
  title: TaskFlow API
  description: The Task Management System API documentation
  version: '1.0'
  contact: {}
tags: []
servers: []
components:
  securitySchemes:
    bearer:
      scheme: bearer
      bearerFormat: JWT
      type: http
  schemas:
    UpdateProfileDto:
      type: object
      properties:
        firstname:
          type: string
          example: John
          description: First name
        lastname:
          type: string
          example: Doe
          description: Last name
        bio:
          type: string
          example: Software developer
          description: User bio
        currentPassword:
          type: string
          example: currentpass123
          description: Current password (required if changing password)
        newPassword:
          type: string
          example: newpass123
          minimum: 8
          description: New password
    CreateUserDto:
      type: object
      properties:
        firstname:
          type: string
          example: firstname
          description: firstname of user account
        lastname:
          type: string
          example: lastname
          description: lastname of user account
        email:
          type: string
          example: email@google.com
          description: email of user account
        password:
          type: string
          example: password
          minimum: 8
          description: password of user account
      required:
        - firstname
        - lastname
        - email
        - password
    LoginDto:
      type: object
      properties:
        email:
          type: string
          example: test@gmail.com
          description: email of user
        password:
          type: string
          example: '123123123'
          description: password of user
      required:
        - email
        - password
    CreateWorkspaceDto:
      type: object
      properties:
        name:
          type: string
          example: Marketing team
        description:
          type: string
          example: description of workspace
        isPrivate:
          type: boolean
          default: false
          description: set the workspace to false
      required:
        - name
        - description
        - isPrivate
    UpdateWorkspaceDto:
      type: object
      properties:
        name:
          type: string
          example: Marketing team
        description:
          type: string
          example: description of workspace
        isPrivate:
          type: boolean
          default: false
          description: set the workspace to false
    CreateInvitationDto:
      type: object
      properties:
        email:
          type: string
          example: user@example.com
          description: Email of user to invite
        role:
          type: string
          example: member
          enum:
            - admin
            - member
            - viewer
          description: Role for invited user
        message:
          type: string
          example: Join us!
          description: Custom message for invitation
      required:
        - email
        - role
    CreateWorkspaceMemberDto:
      type: object
      properties: {}
    UpdateWorkspaceMemberDto:
      type: object
      properties: {}
    CreateBoardDto:
      type: object
      properties:
        name:
          type: string
          example: Board 1
        description:
          type: string
          example: Board 1 description
        backgroundColor:
          type: string
          example: '#666'
          description: should be hex color
        visibility:
          type: string
          example: PUBLIC
          enum:
            - PUBLIC
            - PRIVATE
            - WORKSPACE
      required:
        - name
        - description
        - backgroundColor
        - visibility
    CreateColumnDto:
      type: object
      properties:
        name:
          type: string
          example: To Do
          description: Column name
      required:
        - name
    CreateTaskDto:
      type: object
      properties:
        title:
          type: string
          example: task 1
          description: task title
          minLength: 3
          maxLength: 200
        description:
          type: string
          example: task 1 description
          description: task description
        columnId:
          type: string
          example: uuid
          description: column id that you will create task in
        priority:
          type: string
          example: high
          default: medium
          description: priority of task
        dueDate:
          type: string
          example: 2026-04-12T16:59:56.434Z
          description: due date of task
        estimatedHours:
          type: number
          example: 50
          description: estimated Hours of the task to be done
        assigneeIds:
          example:
            - uuid
          description: array of assignee ids to assign users to that task
          type: array
          items:
            type: string
        tagIds:
          example:
            - uuid
          description: array of tag ids to give tags to that task
          type: array
          items:
            type: string
      required:
        - title
    UpdateBoardDto:
      type: object
      properties:
        name:
          type: string
          example: Board 1
        description:
          type: string
          example: Board 1 description
        backgroundColor:
          type: string
          example: '#666'
          description: should be hex color
        visibility:
          type: string
          example: PUBLIC
          enum:
            - PUBLIC
            - PRIVATE
            - WORKSPACE
    UpdateColumnDto:
      type: object
      properties:
        name:
          type: string
          example: To Do
          description: Column name
    ReOrderColumnDto:
      type: object
      properties:
        columnId:
          type: string
          example: uuid
          description: Column UUID to reorder
        newPosition:
          type: number
          example: 2
          description: New position for the column
      required:
        - columnId
        - newPosition
    UpdateTaskDto:
      type: object
      properties:
        title:
          type: string
          example: task 1
          description: task title
          minLength: 3
          maxLength: 200
        description:
          type: string
          example: task 1 description
          description: task description
        columnId:
          type: string
          example: uuid
          description: column id that you will create task in
        priority:
          type: string
          example: high
          default: medium
          description: priority of task
        dueDate:
          type: string
          example: 2026-04-12T16:59:56.434Z
          description: due date of task
        estimatedHours:
          type: number
          example: 50
          description: estimated Hours of the task to be done
        assigneeIds:
          example:
            - uuid
          description: array of assignee ids to assign users to that task
          type: array
          items:
            type: string
        tagIds:
          example:
            - uuid
          description: array of tag ids to give tags to that task
          type: array
          items:
            type: string
    AssignUsersToTaskDto:
      type: object
      properties:
        assigneeIds:
          example:
            - uuid1
            - uuid2
          description: Array of user IDs to assign to task
          type: array
          items:
            type: string
      required:
        - assigneeIds
    MoveTaskDto:
      type: object
      properties:
        columnId:
          type: string
          example: uuid
          description: Target column UUID
        position:
          type: number
          example: 0
          minimum: 0
          description: New position in column
      required:
        - columnId
        - position
    CreateCommentDto:
      type: object
      properties:
        content:
          type: string
          example: This task looks good
          description: Comment content
        mentionedUserIds:
          example:
            - uuid1
            - uuid2
          description: Array of user IDs mentioned in comment
          type: array
          items:
            type: string
      required:
        - content
    UpdateCommentDto:
      type: object
      properties:
        content:
          type: string
          example: This task looks good
          description: Comment content
        mentionedUserIds:
          example:
            - uuid1
            - uuid2
          description: Array of user IDs mentioned in comment
          type: array
          items:
            type: string
    UpdateAttachmentDto:
      type: object
      properties: {}
    CreateTagDto:
      type: object
      properties:
        name:
          type: string
          example: Urgent
          description: Tag name
        color:
          type: string
          example: '#FF0000'
          description: Tag color in hex format
      required:
        - name
        - color
    CreateActivityDto:
      type: object
      properties:
        action:
          type: string
          example: Task updated
          description: Activity action or description
      required:
        - action
    CreateTaskAssigneeDto:
      type: object
      properties: {}
    CreateTaskTagDto:
      type: object
      properties: {}
    CreateTaskWatcherDto:
      type: object
      properties: {}
